<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMEKKA DOCUMENTARY | Award Winning Portfolio</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --accent: #D4AF37;
            --white: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --ease: cubic-bezier(0.85, 0, 0.15, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        
        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 100vh;
            overflow: hidden; /* Lock scroll during intro */
        }

        /* --- CINEMATIC GRAIN --- */
        body::after {
            content: ""; position: fixed; inset: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png');
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* --- 1. INTRO SYSTEM (SMOOTH FLY) --- */
        #intro-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s var(--ease);
        }

        #intro-box {
            position: fixed; display: flex; align-items: center; gap: 20px;
            z-index: 10001; transition: all 1.8s var(--ease);
        }

        .intro-img {
            width: 85px; height: 85px;
            background: url('https://drive.google.com/thumbnail?id=1aMILwY8Kv4fE5BWrsyTJa_OVgx_ww97o&sz=w500') center/cover;
            transition: all 1.8s var(--ease);
        }

        .intro-text {
            font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800;
            letter-spacing: 5px; color: var(--white); white-space: nowrap;
            transition: all 1.8s var(--ease);
        }

        #intro-box.landed {
            top: 20px !important; left: 5% !important; margin: 0; transform: scale(1); gap: 12px;
        }
        #intro-box.landed .intro-img { width: 35px; height: 35px; }
        #intro-box.landed .intro-text { font-size: 0.95rem; letter-spacing: 1.5px; }

        /* --- 2. MUSIC PLAYER (FLOATING VISUALIZER) --- */
        #music-player {
            position: fixed; left: 25px; bottom: 25px; z-index: 10002;
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            padding: 12px 20px; border-radius: 50px; border: 1px solid var(--border);
            cursor: pointer; transition: 0.4s; opacity: 0; transform: translateY(20px);
        }
        #music-player.visible { opacity: 1; transform: translateY(0); }

        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 15px; }
        .bar { width: 3px; background: var(--accent); border-radius: 50px; transition: height 0.2s; height: 3px; }

        /* Animasi bar saat play */
        .playing .bar:nth-child(1) { animation: pulse 0.5s infinite alternate; }
        .playing .bar:nth-child(2) { animation: pulse 0.8s infinite alternate; }
        .playing .bar:nth-child(3) { animation: pulse 0.6s infinite alternate; }
        .playing .bar:nth-child(4) { animation: pulse 0.7s infinite alternate; }

        @keyframes pulse { from { height: 3px; } to { height: 15px; } }

        /* --- 3. SIDE TOOLS --- */
        #side-tools {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            z-index: 999; display: flex; flex-direction: column; gap: 15px;
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            padding: 20px 10px; border-radius: 50px; border: 1px solid var(--border);
            opacity: 0; transition: 1s;
        }
        #side-tools a {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            color: #555; text-decoration: none; border-radius: 50%; transition: 0.3s;
        }
        #side-tools a:hover { color: var(--accent); background: rgba(255,255,255,0.05); }

        /* --- 4. NAVBAR --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            z-index: 998; border-bottom: 1px solid var(--border);
            opacity: 0; transition: 1s;
        }

        /* --- 5. SECTIONS --- */
        main { opacity: 0; transition: 1s; }
        section { padding: 100px 8%; border-bottom: 1px solid var(--border); opacity: 0; transform: translateY(30px); transition: 1s var(--ease); }
        section.reveal { opacity: 1; transform: translateY(0); }
        .section-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 50px; text-transform: uppercase; letter-spacing: -2px; }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(3.5rem, 15vw, 12rem); line-height: 0.8; }
        .hero p { color: var(--accent); letter-spacing: 8px; margin-top: 20px; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }

        /* ACHIEVEMENT */
        .achieve-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .achieve-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 40px 30px; border-left: 5px solid var(--accent); transition: 0.4s; }
        .achieve-card:hover { transform: translateY(-10px); background: rgba(212, 175, 55, 0.05); }
        .achieve-card h3 { font-family: 'Syne', sans-serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 10px; }

        /* TEAM GRID */
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 60px 20px; }
        .member-wrapper { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        .scene { width: 140px; height: 260px; perspective: 1000px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .backlight { position: absolute; top: 45px; width: 120px; height: 180px; background: var(--accent); filter: blur(40px); opacity: 0; z-index: 1; transition: opacity 0.6s ease; }
        .rope { width: 3px; height: 45px; background: #222; transform-origin: top center; z-index: 2; position: relative; }
        .id-card { width: 135px; height: 210px; background: #0c0c0c; border: 1px solid var(--border); border-radius: 12px; position: absolute; top: 43px; transform-origin: top center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); overflow: hidden; cursor: pointer; z-index: 3; }
        .photo { width: 100%; height: 130px; background-size: cover; background-position: center; filter: grayscale(1) brightness(1.1); border-bottom: 2px solid var(--border); transition: 0.6s ease; background-image: url('https://drive.google.com/thumbnail?id=15HT1M6jS8K3NjtTWBBw84Gi1a8o4K3VW&sz=w500'); }
        .id-card.active-mode .photo { filter: grayscale(0) brightness(1); border-color: var(--accent); }
        .id-card.active-mode + .backlight { opacity: 0.3; }

        .info-panel h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; color: var(--accent); margin-bottom: 5px; }
        .tag-info { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        footer { padding: 100px 5%; text-align: center; border-top: 1px solid var(--border); }
        .ig-smekka { padding: 16px 40px; background: #fff; color: #000; text-decoration: none; border-radius: 5px; font-weight: 800; font-size: 0.8rem; display: inline-block; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .member-wrapper { flex-direction: column; text-align: center; }
            .info-panel { border-top: 1px solid var(--border); padding-top: 20px; width: 100%; }
            #intro-box { flex-direction: column; gap: 10px; }
            #intro-text { font-size: 1.2rem; }
            #music-player { left: 10px; bottom: 10px; padding: 10px 15px; }
        }
    </style>
</head>
<body>

    <!-- Intro Layer -->
    <div id="intro-overlay"></div>
    <div id="intro-box">
        <div class="intro-img"></div>
        <div class="intro-text">SMEKKA DOCUMENTARY</div>
    </div>

    <!-- Music Player -->
    <div id="music-player" onclick="toggleMusic()">
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; color: var(--white);" id="music-status">PLAY MUSIC</span>
        <audio id="bg-music" loop>
            <source src="https://drive.google.com/uc?export=download&id=1LChY-JdqmLVbJpnKd0PwM8n4TxznrU2E" type="audio/mpeg">
        </audio>
    </div>

    <nav id="navbar"></nav>

    <!-- Side Tools -->
    <div id="side-tools">
        <a href="#home"><i class="fas fa-home"></i></a>
        <a href="#awards"><i class="fas fa-trophy"></i></a>
        <a href="#team"><i class="fas fa-users"></i></a>
        <a href="#contact"><i class="fas fa-at"></i></a>
    </div>

    <main id="main-content">
        <header class="hero" id="home">
            <p>Visionary Creative House</p>
            <h1>SMEKKA<br>DIRECTORS.</h1>
        </header>

        <!-- Achievements -->
        <section id="awards">
            <h2 class="section-title">HALL OF FAME.</h2>
            <div class="achieve-grid">
                <div class="achieve-card">
                    <i class="fas fa-award"></i>
                    <h3>JUARA 2</h3>
                    <p>FOTOGRAFI FLS2N<br>TINGKAT KABUPATEN</p>
                </div>
                <div class="achieve-card">
                    <i class="fas fa-film"></i>
                    <h3>JUARA 3</h3>
                    <p>SHORT FILM FLS2N<br>TINGKAT KABUPATEN</p>
                </div>
            </div>
        </section>

        <!-- Team -->
        <section id="team">
            <h2 class="section-title" style="text-align: center;">THE COLLECTIVE.</h2>
            <div class="team-grid" id="team-render"></div>
        </section>

        <footer id="contact">
            <h2 style="font-family:'Syne'; margin-bottom: 25px; font-size: 2rem;">LET'S WORK.</h2>
            <a href="https://www.instagram.com/smekkadoc?igsh=MWZ0cW5uNXo2YXp2ZA==" target="_blank" class="ig-smekka">
                <i class="fab fa-instagram"></i> Follow @smekkadoc
            </a>
            <div style="margin-top: 100px; font-size: 0.6rem; opacity: 0.3; letter-spacing: 5px;">SMEKKA DOCUMENTARY &bull; SMK KARYA &bull; EST 2020</div>
        </footer>
    </main>

    <script>
        // --- 1. MUSIC ENGINE ---
        const audio = document.getElementById('bg-music');
        const visualizer = document.getElementById('visualizer');
        const statusText = document.getElementById('music-status');

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                visualizer.classList.add('playing');
                statusText.innerText = "SOUND ON";
                statusText.style.color = "var(--accent)";
            } else {
                audio.pause();
                visualizer.classList.remove('playing');
                statusText.innerText = "SOUND OFF";
                statusText.style.color = "var(--white)";
            }
        }

        // --- 2. INTRO SYSTEM ---
        window.addEventListener('load', () => {
            const intro = document.getElementById('intro-box');
            const overlay = document.getElementById('intro-overlay');
            const main = document.getElementById('main-content');
            const nav = document.getElementById('navbar');
            const tools = document.getElementById('side-tools');
            const player = document.getElementById('music-player');

            setTimeout(() => {
                intro.classList.add('landed');
                overlay.style.opacity = "0";
                main.style.opacity = "1";
                nav.style.opacity = "1";
                tools.style.opacity = "1";
                player.classList.add('visible');
                document.body.style.overflow = "auto";
                setTimeout(() => overlay.style.display = "none", 1500);
            }, 2000);
        });

        // --- 3. TEAM DATA ---
        const members = [
            { name: "Trio Setiawan", role: "Creative Director" },
            { name: "Trio Setiawan", role: "Director of Photo" },
            { name: "Trio Setiawan", role: "Lead Editor" },
            { name: "Trio Setiawan", role: "Cinematographer" },
            { name: "Trio Setiawan", role: "Post Producer" },
            { name: "Trio Setiawan", role: "Lead Colorist" },
            { name: "Trio Setiawan", role: "Sound Design" },
            { name: "Trio Setiawan", role: "Art Director" },
            { name: "Trio Setiawan", role: "Project Manager" }
        ];

        const container = document.getElementById('team-render');
        members.forEach((m, i) => {
            container.innerHTML += `
                <div class="member-wrapper">
                    <div class="scene">
                        <div class="backlight"></div>
                        <div class="rope"></div>
                        <div class="id-card" onclick="interact(this)">
                            <div class="photo"></div>
                            <div class="card-meta">
                                <h4>${m.name.toUpperCase()}</h4>
                                <p>${m.role}</p>
                            </div>
                        </div>
                    </div>
                    <div class="info-panel">
                        <h3>${m.name}</h3>
                        <div class="tag-info">Kelas: <b>XII</b></div>
                        <div class="tag-info">Jurusan: <b>Multimedia</b></div>
                        <a href="https://www.instagram.com/setiagraphyy?igsh=MWxubGp0N3B4OHpkZw==" class="ig-icon" target="_blank" style="color:var(--accent); font-size:1.1rem; margin-top:10px; display:inline-block;">
                            <i class="fab fa-instagram"></i>
                        </a>
                    </div>
                </div>
            `;
        });

        // --- 4. PHYSICS ENGINE ---
        const cards = document.querySelectorAll('.id-card');
        const physics = Array.from(cards).map(() => ({ x:0, y:0, vX:0, vY:0, tX:0, tY:0 }));

        function interact(el) {
            el.classList.toggle('active-mode');
            const idx = Array.from(cards).indexOf(el);
            physics[idx].vX = (Math.random() - 0.5) * 85;
            physics[idx].vY = (Math.random() - 0.5) * 85;
        }

        function loop() {
            cards.forEach((el, i) => {
                const p = physics[i];
                const rope = el.previousElementSibling;
                const glow = el.previousElementSibling.previousElementSibling;
                const spring = 0.12; const friction = 0.85;
                const time = Date.now() * 0.0015;
                p.tX = Math.sin(time + i) * 3; p.tY = Math.cos(time * 0.8 + i) * 2;
                p.vX += (p.tX - p.x) * spring; p.vY += (p.tY - p.y) * spring;
                p.vX *= friction; p.vY *= friction; p.x += p.vX; p.y += p.vY;
                el.style.transform = `rotateX(${p.x}deg) rotateY(${p.y}deg)`;
                rope.style.transform = `rotate(${p.y * 0.5}deg)`;
                glow.style.transform = `rotateX(${p.x}deg) rotateY(${p.y}deg) translateZ(-20px)`;
            });
            requestAnimationFrame(loop);
        }
        loop();

        window.addEventListener('scroll', () => {
            document.querySelectorAll('section').forEach(sec => {
                if (window.scrollY >= sec.offsetTop - 600) sec.classList.add('reveal');
            });
        });
    </script>
</body>
</html>
